<!DOCTYPE html>
<html>
    <head>
        <title>Users</title>
    </head>
    <body>
        <h1>Users</h1>
        <ul>
            {% for user in users %}
                <li>{{ user["name"] }}</li>
            {% endfor %}
        </ul>
        <h1>Friends</h1>
        {% for user_name, friends_list in friends.items() %}
            <p>{{ user_name }}'s friends:</p>
            <ul>
                {% for friend in friends_list %}
                    <li>{{ friend }}</li>
                {% endfor %}
            </ul>
        {% endfor %}
    </body>
</html>
